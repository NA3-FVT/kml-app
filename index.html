<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KML QR PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; margin:0; }
#map { height: 60vh; }
.panel { padding: 15px; background: #f4f4f4; }
button { margin-top: 5px; padding: 10px; }
</style>

</head>

<body>

<div class="panel">

<h3>🚗 KML QR PRO</h3>

<button onclick="scanQR('ruta')">📷 QR Ruta</button>
<button onclick="scanQR('wp')">📷 QR Waypoints</button>

<div id="qr-reader" style="width:300px;"></div>

<br>

Radio (m):
<input type="number" id="radio" value="100">

<button onclick="startGPS()">▶ START</button>

<p id="status">Esperando QR...</p>

</div>

<div id="map"></div>

<script>

// ---------------- MAPA ----------------
let map = L.map('map').setView([41.3851, 2.1734], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let rutaLayer;
let wpMarkers = [];
let waypoints = [];
let alertados = new Set();
let gpsMarker;

// ---------------- PARSEO KML ----------------
function parseKML(text, tipo) {

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    let placemarks = xml.getElementsByTagName("Placemark");

    let rutaCoords = [];

    if (tipo === "wp") {
        waypoints = [];
        wpMarkers.forEach(m => map.removeLayer(m));
        wpMarkers = [];
    }

    for (let p of placemarks) {

        let name = p.getElementsByTagName("name")[0]?.textContent || "WP";

        let coordNode = p.getElementsByTagName("coordinates")[0];
        if (!coordNode) continue;

        let coords = coordNode.textContent.trim().split(/\s+/);

        if (coords.length > 1 && tipo === "ruta") {

            coords.forEach(c => {
                let [lon, lat] = c.split(",");
                rutaCoords.push([parseFloat(lat), parseFloat(lon)]);
            });

        } else if (tipo === "wp") {

            let [lon, lat] = coords[0].split(",");

            let wp = {
                lat: parseFloat(lat),
                lon: parseFloat(lon),
                name: name
            };

            waypoints.push(wp);

            let marker = L.marker([wp.lat, wp.lon])
                .addTo(map)
                .bindPopup(wp.name);

            wpMarkers.push(marker);
        }
    }

    if (tipo === "ruta") {
        if (rutaLayer) map.removeLayer(rutaLayer);

        rutaLayer = L.polyline(rutaCoords, {color:'blue'}).addTo(map);
        map.fitBounds(rutaLayer.getBounds());
    }

    document.getElementById("status").innerText =
        "✅ Cargado: " + tipo +
        " | WP: " + waypoints.length;
}

// ---------------- CARGA DESDE URL ----------------
async function loadKML(url, tipo) {
    try {
        let res = await fetch(url);
        let text = await res.text();

        parseKML(text, tipo);

    } catch (e) {
        alert("Error cargando KML");
    }
}

// ---------------- QR ----------------
function scanQR(tipo) {

    const qr = new Html5Qrcode("qr-reader");

    qr.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        async (decodedText) => {

            document.getElementById("status").innerText =
                `QR detectado (${tipo})`;

            await loadKML(decodedText, tipo);

            qr.stop();
            document.getElementById("qr-reader").innerHTML = "";
        }
    );
}

// ---------------- DISTANCIA ----------------
function distancia(lat1, lon1, lat2, lon2) {
    let R = 6371000;
    let dLat = (lat2-lat1)*Math.PI/180;
    let dLon = (lon2-lon1)*Math.PI/180;

    let a = Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2)**2;

    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ---------------- GPS ----------------
function startGPS() {

    if (!waypoints.length) {
        alert("Carga primero los waypoints (QR)");
        return;
    }

    const RADIO = parseInt(document.getElementById("radio").value);

    navigator.geolocation.watchPosition(pos => {

        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;

        if (gpsMarker) map.removeLayer(gpsMarker);

        gpsMarker = L.marker([lat, lon]).addTo(map);

        waypoints.forEach((wp, i) => {

            let d = distancia(lat, lon, wp.lat, wp.lon);

            if (d < RADIO && !alertados.has(i)) {
                alertados.add(i);
                alertar(wp, d);
            }
        });

        document.getElementById("status").innerText =
            `📍 ${lat.toFixed(5)}, ${lon.toFixed(5)}`;

    }, () => {
        alert("Error GPS");
    }, { enableHighAccuracy: true });
}

// ---------------- ALERTA ----------------
function alertar(wp, dist) {

    let audio = new Audio("https://www.soundjay.com/buttons/beep-07.wav");
    audio.play();

    document.getElementById("status").innerText =
        `🔊 ${wp.name} a ${Math.round(dist)} m`;
}

</script>

</body>
</html>
