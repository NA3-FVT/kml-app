<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KML NAV PRO FULL STABLE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { margin:0; font-family: Arial; }
#map { height: 100vh; }
.panel { padding: 10px; background: #f4f4f4; }
.hidden { display:none; }
button { margin:5px; padding:8px; }

.car-icon {
    font-size: 32px;
    transform-origin: center;
}
</style>
</head>

<body>

<div id="panel" class="panel">

<h3>🚗 NAV PRO FULL (STABLE)</h3>

<b>Ruta:</b><br>
<input type="file" id="rutaFile">
<button onclick="scanQR('ruta')">QR Ruta</button>

<br><br>

<b>Waypoints:</b><br>
<input type="file" id="wpFile">
<button onclick="scanQR('wp')">QR WP</button>

<div id="qr-reader" style="width:250px;"></div>

<br>

Radio (m):
<input type="number" id="radio" value="100">

<br>

<button onclick="startApp()">START NAV</button>

<p id="status">⚪ Esperando datos...</p>

</div>

<div id="map"></div>

<script>

// ================= MAPA =================
let map = L.map('map').setView([41.3851,2.1734],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let rutaLayer;
let wpMarkers = [];
let waypoints = [];
let rutaCoords = [];
let gpsMarker;
let alertados = new Set();

let rutaLoaded = false;
let wpLoaded = false;

// ✅ NUEVAS VARIABLES (NO ROMPEN NADA)
let firstFix = true;
let followMode = true;

// ================= ICONO COCHE =================
const carIcon = L.divIcon({
    html: "<div id='car' class='car-icon'>🚗</div>",
    iconSize: [30,30],
    className: ""
});

function rotateCar(angle){
    const el = document.getElementById("car");
    if(el){
        el.style.transform = "rotate(" + angle + "deg)";
    }
}

// ================= PARSE KML =================
function parseKML(text,tipo){

    if(!text.includes("<kml")){
        alert("❌ No es KML válido");
        return;
    }

    const xml = new DOMParser().parseFromString(text,"text/xml");
    const placemarks = xml.getElementsByTagName("Placemark");

    console.log("Placemark encontrados:", placemarks.length);

    if(tipo==="wp"){
        waypoints=[];
        wpMarkers.forEach(m=>map.removeLayer(m));
        wpMarkers=[];
        wpLoaded=false;
    }

    if(tipo==="ruta"){
        rutaCoords=[];
        rutaLoaded=false;
    }

    for(let p of placemarks){

        let name = p.getElementsByTagName("name")[0]?.textContent || "WP";

        let point = p.getElementsByTagName("Point");

        if(point.length>0 && tipo==="wp"){
            let coord = point[0]
                .getElementsByTagName("coordinates")[0]
                .textContent.trim();

            let [lon,lat] = coord.split(",");

            let wp = {
                lat:parseFloat(lat),
                lon:parseFloat(lon),
                name:name
            };

            waypoints.push(wp);

            let m=L.marker([wp.lat,wp.lon])
                .addTo(map)
                .bindPopup(name);

            wpMarkers.push(m);
        }

        let line = p.getElementsByTagName("LineString");

        if(line.length>0 && tipo==="ruta"){
            let coords=line[0]
                .getElementsByTagName("coordinates")[0]
                .textContent.trim()
                .split(/\s+/);

            coords.forEach(c=>{
                let [lon,lat]=c.split(",");
                rutaCoords.push([parseFloat(lat),parseFloat(lon)]);
            });
        }
    }

    if(tipo==="ruta" && rutaCoords.length>0) rutaLoaded=true;
    if(tipo==="wp" && waypoints.length>0) wpLoaded=true;

    updateStatus();
    drawMap();
}

// ================= STATUS =================
function updateStatus(){

    let msg="";

    if(rutaLoaded) msg+="✅ Ruta ";
    if(wpLoaded) msg+="✅ Waypoints ";

    if(!rutaLoaded && !wpLoaded){
        msg="⚪ Esperando datos...";
    }

    document.getElementById("status").innerText = msg;
}

// ================= DIBUJO MAPA =================
function drawMap(){

    if(rutaLayer) map.removeLayer(rutaLayer);

    if(rutaCoords.length){
        rutaLayer=L.polyline(rutaCoords,{color:'blue'}).addTo(map);
    }

    let layers=[...wpMarkers];
    if(rutaLayer) layers.push(rutaLayer);

    if(layers.length){
        let group=new L.featureGroup(layers);
        map.fitBounds(group.getBounds());
    }
}

// ================= ARCHIVOS =================
function readFile(file,tipo){
    let reader=new FileReader();
    reader.onload=e=>parseKML(e.target.result,tipo);
    reader.readAsText(file);
}

document.getElementById("rutaFile").onchange=e=>readFile(e.target.files[0],"ruta");
document.getElementById("wpFile").onchange=e=>readFile(e.target.files[0],"wp");

// ================= QR =================
function scanQR(tipo){

    const qr=new Html5Qrcode("qr-reader");

    qr.start(
        {facingMode:"environment"},
        {fps:10, qrbox:250},

        async(decodedText)=>{

            document.getElementById("status").innerText =
                `📡 QR ${tipo}`;

            await loadKML(decodedText,tipo);

            qr.stop();
            document.getElementById("qr-reader").innerHTML="";
        }
    );
}

// ================= LOAD =================
async function loadKML(url,tipo){

    console.log("URL original:",url);

    if(url.includes("file/d/")){
        let id=url.split("/file/d/")[1].split("/")[0];
        url=`https://drive.google.com/uc?id=${id}`;
    }

    if(url.includes("maps/d")){
        let id=url.split("mid=")[1].split("&")[0];
        url=`https://www.google.com/maps/d/kml?mid=${id}&forcekml=1`;
    }

    let text="";

    try{
        let res=await fetch(url);
        text=await res.text();
    }catch{}

    if(!text.includes("<kml")){
        let proxy="https://corsproxy.io/?";
        let res=await fetch(proxy+encodeURIComponent(url));
        text=await res.text();
    }

    parseKML(text,tipo);
}

// ================= DISTANCIA =================
function distancia(a,b,c,d){
    let R=6371000;
    let dLat=(c-a)*Math.PI/180;
    let dLon=(d-b)*Math.PI/180;

    let A=Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
    Math.sin(dLon/2)**2;

    return R*2*Math.atan2(Math.sqrt(A),Math.sqrt(1-A));
}

// ================= START =================
function startApp(){

    if(!wpLoaded){
        alert("⚠️ Carga waypoints primero");
        return;
    }

    document.getElementById("panel").classList.add("hidden");

    setTimeout(()=>map.invalidateSize(),300);

    const RADIO=parseInt(document.getElementById("radio").value);

    navigator.geolocation.watchPosition(

        pos=>{

            let lat=pos.coords.latitude;
            let lon=pos.coords.longitude;
            let heading=pos.coords.heading || 0;

            if(!gpsMarker){
                gpsMarker=L.marker([lat,lon],{icon:carIcon}).addTo(map);
            }else{
                gpsMarker.setLatLng([lat,lon]);
            }

            rotateCar(heading);

            // ✅ SOLO PRIMER FIX centra y hace zoom
            if(firstFix){
                map.setView([lat,lon],17);
                firstFix=false;
            }

            // ✅ seguimiento pero sin bloquear zoom
            if(followMode){
                map.panTo([lat,lon]);
            }

            waypoints.forEach((wp,i)=>{

                let d=distancia(lat,lon,wp.lat,wp.lon);

                if(d<RADIO && !alertados.has(i)){
                    alertados.add(i);
                    alertar(wp.name,d);
                }
            });

        },

        err=>{

            let msg="GPS ERROR: ";

            if(err.code===1) msg+="Permiso denegado";
            else if(err.code===2) msg+="Sin señal";
            else if(err.code===3) msg+="Timeout";

            alert(msg);
        },

        {enableHighAccuracy:true}
    );
}

// ✅ usuario controla zoom → desactiva seguimiento
map.on("zoomstart", ()=> followMode=false);
map.on("dragstart", ()=> followMode=false);

// ================= ALERTA =================
function alertar(name,dist){

    let audio=new Audio("https://www.soundjay.com/buttons/beep-07.wav");
    audio.play();

    console.log(`${name} a ${dist} m`);
}

</script>

</body>
</html>
