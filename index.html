<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NAV PRO FINAL OK</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { margin:0; font-family: Arial; }
#map { height: 100vh; }

.panel {
    position:absolute;
    top:10px;
    left:10px;
    z-index:999;
    background:#fff;
    padding:10px;
    border-radius:8px;
}

.hidden { display:none; }

/* ✅ coche fijo en el centro */
#car-fixed {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1000;
}
</style>

</head>

<body>

<div id="panel" class="panel">

<b>Ruta:</b><br>
<input type="file" id="rutaFile">

<br><br>

<b>Waypoints:</b><br>
<input type="file" id="wpFile">

<br><br>

<button onclick="startApp()">START</button>

</div>

<!-- ✅ AQUÍ ESTÁ LA CORRECCIÓN -->
<div id="car-fixed">
    <img src="https://raw.githubusercontent.com/NA3-FVT/kml-app/d3b54e75cc4399c043cde833e9a66b403c49dd82/car.png" width="50">
</div>

<div id="map"></div>

<script>

// ================= MAPA =================
let map = L.map('map').setView([41.3851,2.1734],13);
let pane = map.getPane('mapPane');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= VARIABLES =================
let rutaLayer;
let wpMarkers=[];
let waypoints=[];
let rutaCoords=[];

// ================= ROTAR MAPA =================
function rotateMap(angle){
    if(pane){
        pane.style.transform = `rotate(${-angle}deg)`;
        pane.style.transformOrigin = "50% 50%";
    }
}

// ================= PARSE =================
function parseKML(text,tipo){

    const xml=new DOMParser().parseFromString(text,"text/xml");
    const placemarks=xml.getElementsByTagName("Placemark");

    if(tipo==="wp"){
        wpMarkers.forEach(m=>map.removeLayer(m));
        wpMarkers=[];
    }

    if(tipo==="ruta"){
        if(rutaLayer) map.removeLayer(rutaLayer);
        rutaCoords=[];
    }

    for(let p of placemarks){

        let name=p.getElementsByTagName("name")[0]?.textContent || "WP";

        let point=p.getElementsByTagName("Point");
        if(point.length && tipo==="wp"){

            let c=point[0].getElementsByTagName("coordinates")[0].textContent.trim();
            let [lon,lat]=c.split(",");

            let m=L.marker([lat,lon]).addTo(map).bindPopup(name);
            wpMarkers.push(m);
        }

        let line=p.getElementsByTagName("LineString");
        if(line.length && tipo==="ruta"){

            let coords=line[0].getElementsByTagName("coordinates")[0]
                        .textContent.trim().split(/\s+/);

            coords.forEach(c=>{
                let [lon,lat]=c.split(",");
                rutaCoords.push([lat,lon]);
            });
        }
    }

    if(rutaCoords.length){
        rutaLayer=L.polyline(rutaCoords,{color:'blue'}).addTo(map);
        map.fitBounds(rutaLayer.getBounds());
    }
}

// ================= FILE =================
document.getElementById("rutaFile").onchange=e=>{
    let r=new FileReader();
    r.onload=ev=>parseKML(ev.target.result,"ruta");
    r.readAsText(e.target.files[0]);
};

document.getElementById("wpFile").onchange=e=>{
    let r=new FileReader();
    r.onload=ev=>parseKML(ev.target.result,"wp");
    r.readAsText(e.target.files[0]);
};

// ================= START =================
function startApp(){

    document.getElementById("panel").classList.add("hidden");

    setTimeout(()=>map.invalidateSize(),300);

    navigator.geolocation.watchPosition(

        pos=>{

            let lat=pos.coords.latitude;
            let lon=pos.coords.longitude;

            let heading=pos.coords.heading || 0;

            // ✅ centrar SIEMPRE coche
            map.setView([lat,lon],map.getZoom());

            // ✅ rotar mapa
            rotateMap(heading);

        },

        ()=>alert("GPS error"),
        {enableHighAccuracy:true}
    );
}

</script>

</body>
</html>
