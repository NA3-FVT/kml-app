<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KML QR PRO FINAL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; margin:0; }
#map { height: 60vh; }
.panel { padding: 15px; background: #f4f4f4; }
button { margin-top: 5px; padding: 10px; }
</style>

</head>

<body>

<div class="panel">

<h3>🚗 KML QR PRO FINAL</h3>

<button onclick="scanQR('ruta')">📷 QR Ruta</button>
<button onclick="scanQR('wp')">📷 QR Waypoints</button>

<div id="qr-reader" style="width:300px;"></div>

<br>

Radio (m):
<input type="number" id="radio" value="100">

<button onclick="startGPS()">▶ START</button>

<p id="status">Esperando QR...</p>

</div>

<div id="map"></div>

<script>

// ---------------- MAPA ----------------
let map = L.map('map').setView([41.3851, 2.1734], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let rutaLayer;
let wpMarkers = [];
let waypoints = [];
let gpsMarker;
let alertados = new Set();

// ---------------- PARSE KML ROBUSTO ----------------
function parseKML(text, tipo) {

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const placemarks = xml.getElementsByTagName("Placemark");

    let rutaCoords = [];

    if (tipo === "wp") {
        waypoints = [];
        wpMarkers.forEach(m => map.removeLayer(m));
        wpMarkers = [];
    }

    for (let p of placemarks) {

        const name = p.getElementsByTagName("name")[0]?.textContent || "WP";

        // -------- POINT (WAYPOINT)
        const point = p.getElementsByTagName("Point");
        if (point.length > 0 && tipo === "wp") {

            const coordText = point[0]
                .getElementsByTagName("coordinates")[0]
                ?.textContent.trim();

            if (!coordText) continue;

            let [lon, lat] = coordText.split(",");

            const wp = {
                lat: parseFloat(lat),
                lon: parseFloat(lon),
                name: name
            };

            waypoints.push(wp);

            let marker = L.marker([wp.lat, wp.lon])
                .addTo(map)
                .bindPopup(name);

            wpMarkers.push(marker);
        }

        // -------- LINESTRING (RUTA)
        const lines = p.getElementsByTagName("LineString");
        if (lines.length > 0 && tipo === "ruta") {

            const coordsText = lines[0]
                .getElementsByTagName("coordinates")[0]
                ?.textContent.trim();

            if (!coordsText) continue;

            const coordsArray = coordsText.split(/\s+/);

            coordsArray.forEach(c => {
                let [lon, lat] = c.split(",");
                rutaCoords.push([parseFloat(lat), parseFloat(lon)]);
            });
        }
    }

    // -------- DIBUJAR RUTA
    if (tipo === "ruta" && rutaCoords.length > 0) {
        if (rutaLayer) map.removeLayer(rutaLayer);

        rutaLayer = L.polyline(rutaCoords, {color: 'blue'}).addTo(map);
        map.fitBounds(rutaLayer.getBounds());
    }

    document.getElementById("status").innerText =
        `✅ ${tipo} OK | WP: ${waypoints.length} | Ruta pts: ${rutaCoords.length}`;
}


// ---------------- CARGA URL (CORREGIDO) ----------------
async function loadKML(url, tipo) {

    try {
        console.log("URL original:", url);

        // 🔹 1. Convertir si es Google Drive
        if (url.includes("drive.google.com/file/d/")) {
            let id = url.split("/file/d/")[1].split("/")[0];
            url = `https://drive.google.com/uc?id=${id}`;
        }

        // 🔹 2. Convertir si es My Maps
        if (url.includes("maps/d")) {
            let id = url.split("mid=")[1].split("&")[0];
            url = `https://www.google.com/maps/d/kml?mid=${id}&forcekml=1`;
        }

        console.log("URL convertida:", url);

        // 🔹 3. Usar proxy (CLAVE)
        const proxy = "https://api.allorigins.win/raw?url=";
        let finalURL = proxy + encodeURIComponent(url);

        let res = await fetch(finalURL);

        if (!res.ok) throw new Error("Fetch error");

        let text = await res.text();

        console.log("Respuesta:", text.substring(0,150));

        // 🔴 VALIDACIÓN CRÍTICA
        if (!text.includes("<kml")) {
            throw new Error("No es KML válido");
        }

        parseKML(text, tipo);

        document.getElementById("status").innerText =
            `✅ ${tipo} cargado correctamente`;

    } catch (e) {

        console.error(e);

        document.getElementById("status").innerText =
            "❌ Error cargando KML";

        alert("Error: el link no devuelve un KML válido");
    }
}


// ---------------- QR ----------------
function scanQR(tipo) {

    const qr = new Html5Qrcode("qr-reader");

    qr.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        async (decodedText) => {

            document.getElementById("status").innerText =
                `QR detectado (${tipo})`;

            await loadKML(decodedText, tipo);

            qr.stop();
            document.getElementById("qr-reader").innerHTML = "";
        }
    );
}


// ---------------- DISTANCIA ----------------
function distancia(lat1, lon1, lat2, lon2) {
    let R = 6371000;
    let dLat = (lat2-lat1)*Math.PI/180;
    let dLon = (lon2-lon1)*Math.PI/180;

    let a = Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2)**2;

    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}


// ---------------- GPS ----------------
function startGPS() {

    if (!waypoints.length) {
        alert("Carga primero los waypoints");
        return;
    }

    const RADIO = parseInt(document.getElementById("radio").value);

    navigator.geolocation.watchPosition(pos => {

        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;

        if (gpsMarker) map.removeLayer(gpsMarker);
        gpsMarker = L.marker([lat, lon]).addTo(map);

        waypoints.forEach((wp, i) => {

            let d = distancia(lat, lon, wp.lat, wp.lon);

            if (d < RADIO && !alertados.has(i)) {
                alertados.add(i);
                alertar(wp, d);
            }
        });

    }, () => {
        alert("Error GPS");
    }, { enableHighAccuracy: true });
}


// ---------------- ALERTA ----------------
function alertar(wp, dist) {

    let audio = new Audio("https://www.soundjay.com/buttons/beep-07.wav");
    audio.play();

    document.getElementById("status").innerText =
        `🔊 ${wp.name} a ${Math.round(dist)} m`;
}

</script>

</body>
</html>
</html>
