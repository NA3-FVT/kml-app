<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KML NAV PRO COMPLETO</title>

<!-- ✅ BIEN CARGADO -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { margin:0; font-family: Arial; }
#map { height: 100vh; }

.panel {
    position:absolute;
    top:10px;
    left:10px;
    z-index:999;
    background:#fff;
    padding:10px;
    border-radius:8px;
}

.hidden { display:none; }
button { margin-top:5px; }
</style>

</head>

<body>

<div id="panel" class="panel">

<b>Ruta:</b><br>
<input type="file" id="rutaFile">
<button onclick="scanQR('ruta')">QR Ruta</button>

<br><br>

<b>Waypoints:</b><br>
<input type="file" id="wpFile">
<button onclick="scanQR('wp')">QR WP</button>

<div id="qr-reader" style="width:220px;"></div>

<br><br>

Radio (m):
<input type="number" id="radio" value="100">

<br><br>

<button onclick="startApp()">START</button>

</div>

<div id="map"></div>

<script>

// ================= MAPA =================
let map = L.map('map').setView([41.3851, 2.1734], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= VARIABLES =================
let rutaLayer;
let wpMarkers = [];
let waypoints = [];
let rutaCoords = [];

let gpsMarker;
let alertados = new Set();

// control navegación
let firstFix = true;
let followMode = true;

// ================= ICONO COCHE =================
const carIcon = L.icon({
    iconUrl: "https://github.com/NA3-FVT/kml-app/blob/d3b54e75cc4399c043cde833e9a66b403c49dd82/car.png",
    iconSize: [24,24],      // ✅ tamaño pequeño correcto
    iconAnchor: [12,12]
});

// ================= PARSE KML =================
function parseKML(text, tipo){

    if(!text.includes("<kml")){
        alert("❌ No es KML válido");
        return;
    }

    const xml = new DOMParser().parseFromString(text, "text/xml");
    const placemarks = xml.getElementsByTagName("Placemark");

    // limpiar
    if(tipo==="wp"){
        wpMarkers.forEach(m => map.removeLayer(m));
        wpMarkers=[];
        waypoints=[];
    }

    if(tipo==="ruta"){
        if(rutaLayer) map.removeLayer(rutaLayer);
        rutaCoords=[];
    }

    for(let p of placemarks){

        let name = p.getElementsByTagName("name")[0]?.textContent || "WP";

        // WAYPOINTS
        let point = p.getElementsByTagName("Point");
        if(point.length && tipo==="wp"){

            let coords = point[0]
                .getElementsByTagName("coordinates")[0]
                .textContent.trim();

            let [lon,lat] = coords.split(",");

            let wp = {lat:parseFloat(lat), lon:parseFloat(lon), name};
            waypoints.push(wp);

            let m = L.marker([wp.lat, wp.lon])
                .addTo(map)
                .bindPopup(name);

            wpMarkers.push(m);
        }

        // RUTA
        let line = p.getElementsByTagName("LineString");
        if(line.length && tipo==="ruta"){

            let coords = line[0]
                .getElementsByTagName("coordinates")[0]
                .textContent.trim()
                .split(/\s+/);

            coords.forEach(c=>{
                let [lon,lat]=c.split(",");
                rutaCoords.push([parseFloat(lat),parseFloat(lon)]);
            });
        }
    }

    // dibujar ruta
    if(rutaCoords.length){
        rutaLayer = L.polyline(rutaCoords, {color:'blue'}).addTo(map);
        map.fitBounds(rutaLayer.getBounds());
    }
}

// ================= ARCHIVOS =================
document.getElementById("rutaFile").onchange = e=>{
    let r=new FileReader();
    r.onload = ev => parseKML(ev.target.result,"ruta");
    r.readAsText(e.target.files[0]);
};

document.getElementById("wpFile").onchange = e=>{
    let r=new FileReader();
    r.onload = ev => parseKML(ev.target.result,"wp");
    r.readAsText(e.target.files[0]);
};

// ================= QR =================
function scanQR(tipo){

    const qr = new Html5Qrcode("qr-reader");

    qr.start(
        {facingMode:"environment"},
        {fps:10,qrbox:200},

        async(decodedText)=>{
            await loadKML(decodedText,tipo);
            qr.stop();
            document.getElementById("qr-reader").innerHTML="";
        }
    );
}

// ================= LOAD URL =================
async function loadKML(url, tipo){

    if(url.includes("file/d/")){
        let id=url.split("/file/d/")[1].split("/")[0];
        url=`https://drive.google.com/uc?id=${id}`;
    }

    let res = await fetch("https://corsproxy.io/?"+encodeURIComponent(url));
    let text = await res.text();

    parseKML(text, tipo);
}

// ================= GPS =================
function startApp(){

    document.getElementById("panel").classList.add("hidden");
    setTimeout(()=>map.invalidateSize(),300);

    const RADIO = parseInt(document.getElementById("radio").value);

    navigator.geolocation.watchPosition(

        pos=>{

            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;

            // coche
            if(!gpsMarker){
                gpsMarker = L.marker([lat,lon],{icon:carIcon}).addTo(map);

                // ✅ zoom automático SOLO una vez
                map.setView([lat,lon],17);
                firstFix = false;

            } else {
                gpsMarker.setLatLng([lat,lon]);
            }

            // ✅ seguimiento solo si no has tocado el mapa
            if(followMode && !firstFix){
                map.setView([lat,lon], map.getZoom());
            }

            // alerta proximidad
            waypoints.forEach((wp,i)=>{
                let d = distancia(lat,lon,wp.lat,wp.lon);
                if(d < RADIO && !alertados.has(i)){
                    alertados.add(i);
                    beep(wp.name, d);
                }
            });

        },

        ()=>alert("GPS error"),
        {enableHighAccuracy:true}
    );
}

// ================= DISTANCIA =================
function distancia(a,b,c,d){
    let R=6371000;
    let dLat=(c-a)*Math.PI/180;
    let dLon=(d-b)*Math.PI/180;

    let A=Math.sin(dLat/2)**2+
        Math.cos(a*Math.PI/180)*
        Math.cos(c*Math.PI/180)*
        Math.sin(dLon/2)**2;

    return R*2*Math.atan2(Math.sqrt(A),Math.sqrt(1-A));
}

// ================= ALERTA =================
function beep(name,dist){
    new Audio("https://www.soundjay.com/buttons/beep-07.wav").play();
    console.log(name + " a " + dist + " m");
}

// ================= CONTROL ZOOM USUARIO =================
map.on("zoomstart", ()=> followMode=false);
map.on("dragstart", ()=> followMode=false);

</script>

</body>
</html>
</body>
</html>
